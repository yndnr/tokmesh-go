name: release

on:
  push:
    tags:
      - "v*"

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./...

      - name: Build and package artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          combos=(
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
          )
          for combo in "${combos[@]}"; do
            read GOOS GOARCH <<<"${combo}"
            BIN_DIR="dist/${GOOS}-${GOARCH}"
            mkdir -p "${BIN_DIR}"
            EXT=""
            if [ "${GOOS}" = "windows" ]; then
              EXT=".exe"
            fi
            echo "Building ${GOOS}/${GOARCH}"
            GOOS=${GOOS} GOARCH=${GOARCH} CGO_ENABLED=0 go build -o "${BIN_DIR}/tokmesh-server${EXT}" ./cmd/tokmesh-server
            GOOS=${GOOS} GOARCH=${GOARCH} CGO_ENABLED=0 go build -o "${BIN_DIR}/tokmesh-cli${EXT}" ./cmd/tokmesh-cli
            PKG_NAME="TokMesh-${GOOS}-${TAG}-${GOARCH}"
            if [ "${GOOS}" = "windows" ]; then
              (cd "${BIN_DIR}" && zip -r "../${PKG_NAME}.zip" tokmesh-server.exe tokmesh-cli.exe >/dev/null)
              rm -rf "${BIN_DIR}"
            else
              (cd "${BIN_DIR}" && tar -czf "../${PKG_NAME}.tar.gz" tokmesh-server tokmesh-cli)
              rm -rf "${BIN_DIR}"
            fi
          done

      - name: Determine release notes reference
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTE_PATH="docs/releases/${TAG}.md"
          if [ -f "${NOTE_PATH}" ]; then
            echo "body_path=${NOTE_PATH}" >> "$GITHUB_OUTPUT"
          else
            FALLBACK="/tmp/release-notes.txt"
            echo "TokMesh-Go ${TAG} 自动发布版本。" > "${FALLBACK}"
            echo "body_path=${FALLBACK}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          name: TokMesh-Go ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: |
            dist/TokMesh-*
